<VirtualHost *:80>
    Redirect permanent / https://www.jugglingpatterns.de/

    ServerName  www.jugglingpatterns.de
    ServerAlias jugglingpatterns.de
    DocumentRoot /var/www/jugglingpatterns/
    ServerAdmin webmaster@localhost
    ErrorLog ${APACHE_LOG_DIR}/jugglingpatterns-error.log
    CustomLog ${APACHE_LOG_DIR}/jugglingpatterns-access.log combined
    Include   /etc/letsencrypt/options-ssl-apache.conf
    RewriteEngine on
    RewriteCond %{SERVER_NAME} =jugglingpatterns.de
    RewriteCond %{REQUEST_URI} !^(/.well-known.*)
    RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]
    RewriteRule ^wiki/(.*)$ /mediawiki/index.php?title=$1 [L,QSA]

    Alias /mediawiki /var/lib/mediawiki

<Directory /var/lib/mediawiki/>
 Options +FollowSymLinks
 AllowOverride All
 <IfVersion >= 2.3>
  Require all granted
 </IfVersion>
 <IfVersion < 2.3>
  order allow,deny
  allow from all
 </IfVersion>
</Directory>

# some directories must be protected
<Directory /var/lib/mediawiki/config>
 Options -FollowSymLinks
 AllowOverride None
    <IfModule mod_php7.c>
        php_admin_flag engine off
    </IfModule>
</Directory>
<Directory /var/lib/mediawiki/images>
 Options -FollowSymLinks
 AllowOverride None
    <IfModule mod_php7.c>
        php_admin_flag engine off
    </IfModule>
</Directory>
<Directory /var/lib/mediawiki/upload>
 Options -FollowSymLinks
 AllowOverride None
    <IfModule mod_php7.c>
        php_admin_flag engine off
    </IfModule>
</Directory>

SSLCertificateFile /etc/letsencrypt/live/jugglingpatterns.de/fullchain.pem
SSLCertificateKeyFile /etc/letsencrypt/live/jugglingpatterns.de/privkey.pem
</VirtualHost>



<VirtualHost *:443>
    ServerName www.jugglingpatterns.de
    ServerAlias jugglingpatterns.de
    DocumentRoot /var/www/jugglingpatterns/
    ServerAdmin webmaster@localhost
    ErrorLog ${APACHE_LOG_DIR}/jugglingpatterns-error.log
    CustomLog ${APACHE_LOG_DIR}/jugglingpatterns-access.log combined
    SSLEngine on
    Include   /etc/letsencrypt/options-ssl-apache.conf

    RewriteEngine on
    # most of those blocking rules come from a ddos attack from some KI crawlers from meta/facebook
    # Block Meta/Facebook Crawler for most wiki-internal pages
    #RewriteCond %{HTTP_USER_AGENT} (facebookexternalhit|meta-externalagent|amazonbot|ahrefsbot|semrushbot|dotbot|mj12bot) [NC]
    # oder besser wir blocken fuer alle, die nicht eingeloggt sind - der Mehrwert ist hauptsaechlich fuer Editoren da
    # das verringert auch die sichtbare Angriffsflaeche (auch wenn natuerlich ein fake-cookie trivial gesetzt werden kann)
    RewriteCond %{HTTP_COOKIE} !my_jugglingwikiUserID [NC]
    RewriteCond %{HTTP_COOKIE} !my_jugglingwiki_session [NC]
    # block 1st level special pages # RewriteCond %{REQUEST_URI} ^/wiki/Special: [NC,OR]
    # block 1st level special pages # RewriteCond %{REQUEST_URI} ^/mediawiki/Special: [NC,OR]
    # block api requests
    RewriteCond %{REQUEST_URI} ^/mediawiki/api\.php [NC,OR]
    RewriteCond %{REQUEST_URI} ^/wiki/api\.php [NC,OR]
    # block Special:(something) pages except login page and search
    RewriteCond %{QUERY_STRING} !title=Spe(c|z)ial(:|%3A)(Search|UserLogin|UserLogout) [NC]
    RewriteCond %{REQUEST_URI} /Special:(RecentChanges|Export) [NC,OR]
    RewriteCond %{QUERY_STRING} (title=Special|action=|diff=|oldid=) [NC]
    #RewriteRule ^/mediawiki/index\.php$ - [F,L]
    # Zugriff für alle Nicht-Eingeloggten verweigern
    # Das ^ (Anfang) matcht jede URL, die die obigen Bedingungen erfüllt.
    RewriteRule ^ - [F,L]

    # change to url with www
    RewriteCond %{SERVER_NAME} =jugglingpatterns.de
    RewriteCond %{REQUEST_URI} !^(/.well-known.*)
    RewriteRule ^ https://www.%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]

    # we switch from a longer /mediawiki/ to a shorter /wiki/ string in the URL
    # rules to redirect old index.php?title=... to /wiki/...
    RewriteCond %{QUERY_STRING} ^title=([^&]+)$
    RewriteRule ^/*mediawiki/+index\.php$ /wiki/%1? [R=301,L]

    # Redirect  /mediawiki/index.php/Seitenname to /wiki/Seitenname
    RewriteCond %{THE_REQUEST} \s/mediawiki/index\.php/(.+)
    RewriteRule ^/mediawiki/index\.php/(.+)$ /wiki/$1 [R=301,L,NE]

    RewriteRule ^/wiki/(.*)$ /mediawiki/index.php?title=$1 [PT,L,QSA]
    Alias /mediawiki /var/lib/mediawiki

<Directory /var/lib/mediawiki/>
 Options +FollowSymLinks
 AllowOverride All
 <IfVersion >= 2.3>
  Require all granted
 </IfVersion>
 <IfVersion < 2.3>
  order allow,deny
  allow from all
 </IfVersion>
</Directory>

# some directories must be protected
<Directory /var/lib/mediawiki/config>
 Options -FollowSymLinks
 AllowOverride None
    <IfModule mod_php7.c>
        php_admin_flag engine off
    </IfModule>
</Directory>
<Directory /var/lib/mediawiki/images>
 Options -FollowSymLinks
 AllowOverride None
    <IfModule mod_php7.c>
        php_admin_flag engine off
    </IfModule>
</Directory>
<Directory /var/lib/mediawiki/upload>
 Options -FollowSymLinks
 AllowOverride None
    <IfModule mod_php7.c>
        php_admin_flag engine off
    </IfModule>
</Directory>

# Nur cachen, wenn der Nutzer NICHT eingeloggt ist
<IfModule mod_headers.c>
    # Identifiziere eingeloggte Editoren
    SetEnvIf Cookie "my_jugglingwikiUserID" CH_IS_LOGGED_IN
    SetEnvIf Cookie "my_jugglingwiki_session" CH_IS_LOGGED_IN

    # Wenn NICHT eingeloggt: Erst den MediaWiki-Header löschen, dann den eigenen setzen
    Header unset Cache-Control env=!CH_IS_LOGGED_IN
    Header set Cache-Control "max-age=7200, public" env=!CH_IS_LOGGED_IN
    # Optional: Verhindern, dass Google/Bots bei jedem Hit ein "Vary: Cookie" bekommen,
    # was das Caching auf deren Seite oft wieder deaktiviert
    Header merge Vary Cookie
</IfModule>

SSLCertificateFile /etc/letsencrypt/live/jugglingpatterns.de/fullchain.pem
SSLCertificateKeyFile /etc/letsencrypt/live/jugglingpatterns.de/privkey.pem
</VirtualHost>


